project:
  type: book
  output-dir: _book

brand: _brand.yml

book:
  title: "ferx: Nonlinear Mixed Effects Modeling in R"
  author:
    - name: "Teun M. Post"
    - name: "Ron Keizer"
  date: today
  site-url: https://ferx-nlme.github.io/ferx-book/
  repo-url: https://github.com/FeRx-NLME/ferx-book
  repo-actions: [edit, issue]
  favicon: assets/ferx-favicon.svg

  navbar:
    logo: assets/ferx-dsl-brackets.svg
    logo-alt: "ferx"
    left:
      - text: "ferx site"
        href: https://ferx-nlme.github.io
        aria-label: "ferx documentation site"
    right:
      - icon: github
        href: https://github.com/FeRx-NLME/ferx-book
        aria-label: GitHub

  chapters:
    - index.qmd
    - part: "Getting started"
      chapters:
        - chapters/01-installation.qmd
        - chapters/02-quickstart.qmd
    - part: "Core workflow"
      chapters:
        - chapters/03-model-dsl.qmd
        - chapters/04-fitting.qmd
        - chapters/05-diagnostics.qmd
        - chapters/06-simulation-vpc.qmd
    - part: "Advanced topics"
      chapters:
        - chapters/07-parameter-transforms.qmd
        - chapters/08-ode-models.qmd
        - chapters/09-bloq-m3.qmd
        - chapters/10-iov.qmd

format:
  html:
    theme:
      light: [cosmo, assets/ferx.scss]
      dark:  [cosmo, assets/ferx-dark.scss]
    include-after-body:
      - text: |
          <script>(function(){function injectHeaders(){var dark=document.documentElement.getAttribute('data-bs-theme')==='dark';document.querySelectorAll('div.sourceCode').forEach(function(block){if(block.closest('.code-panel'))return;var existing=block.querySelector(':scope > .ferx-panel-head');if(dark&&!existing){var head=document.createElement('div');head.className='ferx-panel-head';head.innerHTML='<span class="ph-dots"><i></i><i></i><i></i></span><span class="ph-br">[</span><span class="ph-file">warfarin_pk.ferx</span><span class="ph-br">]</span>';block.insertBefore(head,block.firstChild);}else if(!dark&&existing){existing.remove();}});}document.addEventListener('DOMContentLoaded',injectHeaders);new MutationObserver(function(ms){ms.forEach(function(m){if(m.attributeName==='data-bs-theme')injectHeaders();});}).observe(document.documentElement,{attributes:true});}());</script>
    toc: true
    toc-depth: 3
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style:
      light: github
      dark:  github-dark
    mainfont: "IBM Plex Sans"
    monofont: "JetBrains Mono"

execute:
  freeze: auto
  cache: true
